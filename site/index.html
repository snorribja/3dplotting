<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSV 3D Dashboard</title>
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #131418;
      --paper: rgba(29, 31, 39, 0.78);
      --ink: #f3f4f7;
      --muted: #9197a8;
      --line: rgba(86, 74, 104, 0.42);
      --accent: #ae5cff;
      --accent-2: #8d34ea;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      font-family: "Inter", "Segoe UI Variable", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(174, 92, 255, 0.18), transparent 22%),
        radial-gradient(circle at 85% 10%, rgba(141, 52, 234, 0.16), transparent 24%),
        linear-gradient(180deg, #131418 0%, #17181d 55%, #131418 100%);
    }
    .shell {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(360px, 430px) minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
    }
    .panel, .viewer {
      background: var(--paper);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      min-height: 0;
    }
    .panel {
      padding: 28px;
      height: calc(100vh - 32px);
      height: calc(100dvh - 32px);
      display: flex;
      flex-direction: column;
      overflow: auto;
      background: linear-gradient(180deg, rgba(31, 33, 41, 0.96), rgba(21, 22, 28, 0.94));
    }
    .eyebrow {
      font-size: 0.74rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 700;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 3.6rem);
      line-height: 0.9;
      font-weight: 700;
      letter-spacing: -0.05em;
      max-width: 10ch;
      font-family: "Syne", "Inter", sans-serif;
    }
    .lede {
      margin: 14px 0 24px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.98rem;
      max-width: 44ch;
    }
    .dropzone {
      border: 1px solid rgba(174, 92, 255, 0.22);
      border-radius: 24px;
      padding: 20px;
      background: linear-gradient(180deg, rgba(34, 28, 44, 0.94), rgba(24, 21, 31, 0.98));
      text-align: left;
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
      cursor: pointer;
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 16px;
      align-items: center;
    }
    .dropzone.dragover {
      border-color: var(--accent);
      background: linear-gradient(180deg, rgba(47, 31, 67, 0.98), rgba(28, 23, 39, 0.98));
      transform: translateY(-2px);
      box-shadow: inset 0 0 0 1px rgba(174, 92, 255, 0.28), 0 18px 36px rgba(0, 0, 0, 0.34);
    }
    .dropzone-badge {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(174, 92, 255, 0.24), rgba(141, 52, 234, 0.22));
      color: #f6efff;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      border: 1px solid rgba(174, 92, 255, 0.18);
    }
    .dropzone-copy { min-width: 0; }
    .dropzone strong {
      display: block;
      font-size: 1.12rem;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #faf8ff;
    }
    .dropzone span {
      color: var(--muted);
      font-size: 0.92rem;
      display: block;
      line-height: 1.45;
    }
    .dropzone-hint {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(174, 92, 255, 0.12);
      color: #ead6ff;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(174, 92, 255, 0.18);
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 13px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
    }
    button:hover { transform: translateY(-1px); }
    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      box-shadow: 0 14px 32px rgba(174, 92, 255, 0.2);
    }
    .secondary {
      background: rgba(255, 255, 255, 0.04);
      color: var(--ink);
      border-color: rgba(86, 74, 104, 0.64);
    }
    .meta, .error {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      display: none;
    }
    .meta {
      background: rgba(174, 92, 255, 0.08);
      color: #ead6ff;
      border: 1px solid rgba(174, 92, 255, 0.16);
    }
    .error {
      background: rgba(239, 68, 68, 0.1);
      color: #fecaca;
      border: 1px solid rgba(239, 68, 68, 0.14);
    }
    .viewer {
      padding: 14px;
      height: calc(100vh - 32px);
      height: calc(100dvh - 32px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(27, 28, 36, 0.94), rgba(18, 19, 24, 0.98));
    }
    .viewer-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 10px 12px 2px;
    }
    .viewer-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .viewer-note {
      color: var(--muted);
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .viewer-stage {
      position: relative;
      min-height: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(86, 74, 104, 0.42);
      border-radius: 22px;
      background: #fff;
    }
    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 32px;
      border: 1px solid rgba(86, 74, 104, 0.42);
      border-radius: 22px;
      background: #fff;
      color: #102132;
    }
    .empty-state.hidden { display: none; }
    .empty-state-inner { max-width: 360px; }
    .empty-state-kicker {
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .empty-state-title {
      margin: 0 0 10px;
      font-family: "Syne", "Inter", sans-serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }
    .empty-state-copy {
      margin: 0;
      color: #5e6875;
      line-height: 1.6;
      font-size: 0.98rem;
    }
    input[type="file"] { display: none; }
    @media (max-width: 980px) {
      body { overflow: auto; }
      .shell {
        grid-template-columns: 1fr;
        min-height: auto;
        padding: 12px;
      }
      .panel {
        height: auto;
        overflow: visible;
      }
      .viewer {
        height: auto;
        min-height: 65vh;
      }
      iframe {
        min-height: 65vh;
        height: 65vh;
      }
      .dropzone {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .dropzone strong { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel">
      <div class="eyebrow">CSV to Website</div>
      <h1>Drop in a file. Use the dashboard.</h1>
      <p class="lede">Upload a CSV and the 3D dashboard opens immediately on the right.</p>

      <form id="upload-form">
        <input id="csv-file" name="csv_file" type="file" accept=".csv,text/csv" />
        <label class="dropzone" id="dropzone" for="csv-file">
          <div class="dropzone-badge">CSV</div>
          <div class="dropzone-copy">
            <strong id="dropzone-title">Drag a CSV here</strong>
            <span id="dropzone-subtitle">Drop it in or click to browse from your machine.</span>
            <div class="dropzone-hint">Ready for upload</div>
          </div>
        </label>

        <div class="actions">
          <button class="primary" type="submit">Show dashboard</button>
          <button class="secondary" id="clear-button" type="button">Clear</button>
        </div>
      </form>

      <div class="meta" id="meta"></div>
      <div class="error" id="error"></div>
    </section>

    <section class="viewer">
      <div class="viewer-header">
        <div class="viewer-title" id="viewer-title">No dashboard loaded yet</div>
        <div class="viewer-note">Interactive dashboard</div>
      </div>
      <div class="viewer-stage">
        <div class="empty-state" id="empty-state">
          <div class="empty-state-inner">
            <div class="empty-state-kicker">No Data Yet</div>
            <h2 class="empty-state-title">Add data to generate a dashboard.</h2>
            <p class="empty-state-copy">Drop in a CSV file and the interactive 3D view will appear here.</p>
          </div>
        </div>
        <iframe id="dashboard-frame" title="Dashboard preview"></iframe>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
